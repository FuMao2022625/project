<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热成像数据实时监控</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .status {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .status.connected {
            background-color: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background-color: #f8d7da;
            color: #721c24;
        }
        .thermal-grid {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px;
            margin: 30px auto;
            width: fit-content;
        }
        .thermal-cell {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .info-item {
            text-align: center;
        }
        .info-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin: 20px 0;
            display: none;
            text-align: center;
        }
        .error-message.show {
            display: block;
        }
        .timestamp {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>热成像数据实时监控</h1>
        
        <div class="status" id="connectionStatus">连接中...</div>
        
        <div class="info-panel">
            <div class="info-item">
                <div class="info-label">设备ID</div>
                <div class="info-value" id="deviceId">--</div>
            </div>
            <div class="info-item">
                <div class="info-label">最高温度</div>
                <div class="info-value" id="maxTemp">--°C</div>
            </div>
            <div class="info-item">
                <div class="info-label">最低温度</div>
                <div class="info-value" id="minTemp">--°C</div>
            </div>
            <div class="info-item">
                <div class="info-label">平均温度</div>
                <div class="info-value" id="avgTemp">--°C</div>
            </div>
        </div>
        
        <div class="thermal-grid" id="thermalGrid"></div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="timestamp" id="lastUpdated">最后更新: --</div>
    </div>
    
    <script>
        let eventSource;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        // 温度到颜色的映射
        function getColorForTemperature(temp) {
            temp = parseFloat(temp);
            if (temp < 20) return '#0000ff'; // 蓝色
            if (temp < 25) return '#00ff00'; // 绿色
            if (temp < 30) return '#ffff00'; // 黄色
            if (temp < 35) return '#ff6600'; // 橙色
            return '#ff0000'; // 红色
        }
        
        // 初始化热成像网格
        function initThermalGrid() {
            const grid = document.getElementById('thermalGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'thermal-cell';
                    cell.id = `cell-${i}-${j}`;
                    cell.textContent = '--';
                    grid.appendChild(cell);
                }
            }
        }
        
        // 更新热成像数据
        function updateThermalData(data) {
            // 更新设备ID
            document.getElementById('deviceId').textContent = data.deviceId || '--';
            
            // 更新温度信息
            document.getElementById('maxTemp').textContent = (data.maxTemp || '--') + '°C';
            document.getElementById('minTemp').textContent = (data.minTemp || '--') + '°C';
            document.getElementById('avgTemp').textContent = (data.avgTemp || '--') + '°C';
            
            // 更新时间戳
            document.getElementById('lastUpdated').textContent = '最后更新: ' + (data.timestamp || new Date().toISOString());
            
            // 更新热成像网格
            if (data.matrix && Array.isArray(data.matrix)) {
                data.matrix.forEach((row, rowIndex) => {
                    row.forEach((temp, colIndex) => {
                        const cell = document.getElementById(`cell-${rowIndex}-${colIndex}`);
                        if (cell) {
                            cell.textContent = temp;
                            cell.style.backgroundColor = getColorForTemperature(temp);
                        }
                    });
                });
            }
        }
        
        // 验证数据格式
        function validateData(data) {
            // 验证矩阵存在
            if (!data.matrix || !Array.isArray(data.matrix)) {
                showError('数据格式错误: 缺少温度矩阵');
                return false;
            }
            
            // 验证矩阵维度 (8x8)
            if (data.matrix.length !== 8) {
                showError(`数据格式错误: 矩阵行数不正确 (${data.matrix.length}行，应为8行)`);
                return false;
            }
            
            for (let i = 0; i < data.matrix.length; i++) {
                if (!Array.isArray(data.matrix[i]) || data.matrix[i].length !== 8) {
                    showError(`数据格式错误: 第${i+1}行列数不正确`);
                    return false;
                }
            }
            
            return true;
        }
        
        // 显示错误消息
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = '错误: ' + message;
            errorElement.classList.add('show');
            setTimeout(hideError, 5000); // 5秒后自动隐藏
        }
        
        // 隐藏错误消息
        function hideError() {
            const errorElement = document.getElementById('errorMessage');
            errorElement.classList.remove('show');
        }
        
        // 调度重连
        function scheduleReconnect() {
            if (reconnectAttempts < maxReconnectAttempts) {
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 8000);
                reconnectAttempts++;
                console.log(`将在 ${delay}ms 后尝试重连...`);
                setTimeout(initSSE, delay);
            } else {
                console.error('重连失败，已达到最大尝试次数');
                document.getElementById('connectionStatus').textContent = '重连失败，请刷新页面';
                showError('连接失败，请刷新页面重试');
            }
        }
        
        // 初始化SSE连接
        function initSSE() {
            const statusElement = document.getElementById('connectionStatus');
            
            // 先关闭之前的连接
            if (eventSource) {
                try {
                    eventSource.close();
                } catch (e) {
                    console.error('关闭旧连接失败:', e);
                }
            }
            
            try {
                console.log('正在建立SSE连接...');
                eventSource = new EventSource('/thermal/thermal-stream');
                
                eventSource.onopen = function() {
                    statusElement.textContent = '已连接';
                    statusElement.className = 'status connected';
                    reconnectAttempts = 0;
                    console.log('SSE连接已建立');
                };
                
                eventSource.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        
                        // 检查是否为心跳消息
                        if (data.type === 'heartbeat') {
                            // 忽略心跳消息
                            return;
                        }
                        
                        // 检查是否为错误消息
                        if (data.type === 'error') {
                            showError(data.message || '服务器返回错误');
                            return;
                        }
                        
                        // 隐藏错误消息
                        hideError();
                        
                        // 验证数据格式
                        if (!validateData(data)) {
                            return;
                        }
                        
                        updateThermalData(data);
                    } catch (error) {
                        console.error('解析SSE数据失败:', error);
                        showError('数据解析失败: ' + error.message);
                    }
                };
                
                eventSource.onerror = function() {
                    // 忽略正常的连接中断
                    if (eventSource.readyState === EventSource.CLOSED) {
                        console.log('SSE连接正常关闭');
                        return;
                    }
                    
                    statusElement.textContent = '连接断开，正在重连...';
                    statusElement.className = 'status disconnected';
                    console.error('SSE连接错误');
                    
                    // 只在连接确实断开时才关闭并重连
                    if (eventSource.readyState === EventSource.CLOSED) {
                        eventSource.close();
                        scheduleReconnect();
                    }
                };
                
            } catch (error) {
                console.error('SSE初始化失败:', error);
                statusElement.textContent = '连接失败';
                statusElement.className = 'status disconnected';
                scheduleReconnect();
            }
        }
        
        // 页面加载时初始化
        window.onload = function() {
            initThermalGrid();
            initSSE();
        };
        
        // 页面关闭时清理
        window.onunload = function() {
            if (eventSource) {
                eventSource.close();
            }
        };
    </script>
</body>
</html>
