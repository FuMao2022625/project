<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温度数据实时监控 - SSE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", "Microsoft Yahei", "PingFang SC", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            width: 100%;
            max-width: 900px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #718096;
            font-size: 1.1rem;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .control-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .control-card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .control-card h3 {
            color: #2d3748;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .temperature-display {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2rem;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 16px;
            color: #2d3748;
        }

        .temperature-value {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .temperature-unit {
            font-size: 1.5rem;
            opacity: 0.8;
        }

        .temperature-timestamp {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .status-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .status-item .label {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-item .value {
            color: #2d3748;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-indicator.connected {
            background: #48bb78;
            box-shadow: 0 0 10px rgba(72, 187, 120, 0.5);
        }

        .status-indicator.disconnected {
            background: #f56565;
            box-shadow: 0 0 10px rgba(245, 101, 101, 0.5);
        }

        .data-log {
            background: #1a202c;
            border-radius: 12px;
            padding: 1.5rem;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #2d3748;
        }

        .data-log .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.25rem 0;
            border-bottom: 1px solid #2d3748;
        }

        .data-log .log-entry:last-child {
            border-bottom: none;
        }

        .log-timestamp {
            color: #718096;
            margin-right: 1rem;
        }

        .log-temperature {
            color: #f6ad55;
            font-weight: 600;
        }

        .log-event {
            color: #68d391;
        }

        .log-error {
            color: #fc8181;
        }

        .chart-container {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }

        .chart-canvas {
            width: 100%;
            height: 200px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
        }

        .input-group label {
            color: #4a5568;
            font-weight: 600;
            min-width: 80px;
        }

        .input-group input {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            flex: 1;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .container {
                padding: 1.5rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .temperature-value {
                font-size: 3rem;
            }
            
            .control-panel {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container fade-in">
        <div class="header">
            <h1>🌡️ 温度数据实时监控</h1>
            <p>基于服务器发送事件(SSE)的实时温度监测系统</p>
        </div>

        <div class="control-panel">
            <div class="control-card">
                <h3>📡 连接控制</h3>
                <div class="button-group">
                    <button id="connectBtn" class="btn btn-primary">
                        <span id="connectBtnText">连接SSE</span>
                        <span id="connectLoading" class="loading" style="display: none;"></span>
                    </button>
                    <button id="disconnectBtn" class="btn btn-danger" disabled>断开连接</button>
                </div>
            </div>

            <div class="control-card">
                <h3>🔧 采集控制</h3>
                <div class="button-group">
                    <button id="startCollectionBtn" class="btn btn-primary">开始采集</button>
                    <button id="stopCollectionBtn" class="btn btn-secondary" disabled>停止采集</button>
                    <button id="resetTempBtn" class="btn btn-secondary">重置温度</button>
                </div>
            </div>

            <div class="control-card">
                <h3>⚙️ 参数设置</h3>
                <div class="input-group">
                    <label>采集间隔(ms):</label>
                    <input type="number" id="collectionInterval" value="2000" min="500" max="10000" step="500">
                </div>
                <div class="input-group">
                    <label>温度范围(°C):</label>
                    <input type="number" id="minTemp" value="15" min="-50" max="100" step="1">
                    <input type="number" id="maxTemp" value="35" min="-50" max="100" step="1">
                </div>
                <button id="applyConfigBtn" class="btn btn-secondary">应用配置</button>
            </div>
        </div>

        <div class="temperature-display">
            <div class="temperature-value" id="currentTemp">--.-</div>
            <div class="temperature-unit">°C</div>
            <div class="temperature-timestamp" id="tempTimestamp">等待数据...</div>
        </div>

        <div class="status-panel">
            <div class="status-item">
                <div class="label">连接状态</div>
                <div class="value">
                    <span id="connectionStatus" class="status-indicator disconnected"></span>
                    <span id="connectionText">未连接</span>
                </div>
            </div>
            <div class="status-item">
                <div class="label">采集状态</div>
                <div class="value" id="collectionStatus">已停止</div>
            </div>
            <div class="status-item">
                <div class="label">活跃连接数</div>
                <div class="value" id="connectionCount">0</div>
            </div>
            <div class="status-item">
                <div class="label">数据接收次数</div>
                <div class="value" id="dataCount">0</div>
            </div>
        </div>

        <div class="chart-container">
            <h3>📊 温度趋势图</h3>
            <canvas id="temperatureChart" class="chart-canvas"></canvas>
        </div>

        <div class="data-log">
            <h3>📝 数据日志</h3>
            <div id="dataLog"></div>
        </div>
    </div>

    <script>
        class TemperatureSSEClient {
            constructor() {
                this.eventSource = null;
                this.isConnected = false;
                this.reconnectAttempts = 0;
                this.maxReconnectAttempts = 5;
                this.reconnectDelay = 1000;
                this.dataCount = 0;
                this.temperatureData = [];
                this.maxDataPoints = 50;
                this.chart = null;
                
                this.initializeElements();
                this.initializeChart();
                this.bindEvents();
                this.startPeriodicUpdates();
            }

            initializeElements() {
                this.elements = {
                    connectBtn: document.getElementById('connectBtn'),
                    disconnectBtn: document.getElementById('disconnectBtn'),
                    startCollectionBtn: document.getElementById('startCollectionBtn'),
                    stopCollectionBtn: document.getElementById('stopCollectionBtn'),
                    resetTempBtn: document.getElementById('resetTempBtn'),
                    applyConfigBtn: document.getElementById('applyConfigBtn'),
                    connectBtnText: document.getElementById('connectBtnText'),
                    connectLoading: document.getElementById('connectLoading'),
                    currentTemp: document.getElementById('currentTemp'),
                    tempTimestamp: document.getElementById('tempTimestamp'),
                    connectionStatus: document.getElementById('connectionStatus'),
                    connectionText: document.getElementById('connectionText'),
                    collectionStatus: document.getElementById('collectionStatus'),
                    connectionCount: document.getElementById('connectionCount'),
                    dataCount: document.getElementById('dataCount'),
                    dataLog: document.getElementById('dataLog'),
                    collectionInterval: document.getElementById('collectionInterval'),
                    minTemp: document.getElementById('minTemp'),
                    maxTemp: document.getElementById('maxTemp'),
                    temperatureChart: document.getElementById('temperatureChart')
                };
            }

            initializeChart() {
                const canvas = this.elements.temperatureChart;
                const ctx = canvas.getContext('2d');
                
                // 设置canvas尺寸
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * window.devicePixelRatio;
                canvas.height = rect.height * window.devicePixelRatio;
                ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                
                this.chart = {
                    canvas: canvas,
                    ctx: ctx,
                    width: rect.width,
                    height: rect.height,
                    padding: 40
                };
                
                this.drawChart();
            }

            drawChart() {
                const { ctx, width, height, padding } = this.chart;
                
                // 清空画布
                ctx.clearRect(0, 0, width, height);
                
                if (this.temperatureData.length === 0) {
                    ctx.fillStyle = '#718096';
                    ctx.font = '14px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText('等待温度数据...', width / 2, height / 2);
                    return;
                }
                
                const data = this.temperatureData;
                const minTemp = Math.min(...data.map(d => d.value)) - 2;
                const maxTemp = Math.max(...data.map(d => d.value)) + 2;
                
                const chartWidth = width - 2 * padding;
                const chartHeight = height - 2 * padding;
                
                // 绘制网格
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 1;
                
                // 水平网格线
                for (let i = 0; i <= 5; i++) {
                    const y = padding + (chartHeight / 5) * i;
                    ctx.beginPath();
                    ctx.moveTo(padding, y);
                    ctx.lineTo(width - padding, y);
                    ctx.stroke();
                    
                    // 温度标签
                    const temp = maxTemp - (maxTemp - minTemp) * (i / 5);
                    ctx.fillStyle = '#718096';
                    ctx.font = '12px Inter';
                    ctx.textAlign = 'right';
                    ctx.fillText(temp.toFixed(1) + '°C', padding - 10, y + 4);
                }
                
                // 绘制温度曲线
                ctx.strokeStyle = '#f6ad55';
                ctx.lineWidth = 3;
                ctx.beginPath();
                
                data.forEach((point, index) => {
                    const x = padding + (chartWidth / (data.length - 1)) * index;
                    const y = padding + chartHeight - ((point.value - minTemp) / (maxTemp - minTemp)) * chartHeight;
                    
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                
                ctx.stroke();
                
                // 绘制数据点
                ctx.fillStyle = '#f6ad55';
                data.forEach((point, index) => {
                    const x = padding + (chartWidth / (data.length - 1)) * index;
                    const y = padding + chartHeight - ((point.value - minTemp) / (maxTemp - minTemp)) * chartHeight;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }

            bindEvents() {
                this.elements.connectBtn.addEventListener('click', () => this.connect());
                this.elements.disconnectBtn.addEventListener('click', () => this.disconnect());
                this.elements.startCollectionBtn.addEventListener('click', () => this.startCollection());
                this.elements.stopCollectionBtn.addEventListener('click', () => this.stopCollection());
                this.elements.resetTempBtn.addEventListener('click', () => this.resetTemperature());
                this.elements.applyConfigBtn.addEventListener('click', () => this.applyConfiguration());
                
                // 窗口大小改变时重绘图表
                window.addEventListener('resize', () => {
                    setTimeout(() => this.initializeChart(), 100);
                });
            }

            connect() {
                if (this.isConnected) {
                    this.log('已经连接到SSE服务器', 'warning');
                    return;
                }

                this.elements.connectBtn.disabled = true;
                this.elements.connectLoading.style.display = 'inline-block';
                this.elements.connectBtnText.textContent = '连接中...';

                try {
                    this.eventSource = new EventSource('/api/temperature/stream');
                    
                    this.eventSource.onopen = () => {
                        this.isConnected = true;
                        this.reconnectAttempts = 0;
                        this.updateConnectionStatus(true);
                        this.log('SSE连接已建立', 'success');
                        
                        this.elements.connectBtn.disabled = false;
                        this.elements.connectLoading.style.display = 'none';
                        this.elements.connectBtnText.textContent = '已连接';
                        this.elements.disconnectBtn.disabled = false;
                    };

                    this.eventSource.onmessage = (event) => {
                        this.log(`收到消息: ${event.data}`, 'info');
                    };

                    this.eventSource.addEventListener('temperature', (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            this.handleTemperatureData(data);
                        } catch (error) {
                            this.log(`解析温度数据失败: ${error.message}`, 'error');
                        }
                    });

                    this.eventSource.addEventListener('connected', (event) => {
                        const data = JSON.parse(event.data);
                        this.log(`连接确认: ${data.connectionId}`, 'success');
                    });

                    this.eventSource.addEventListener('heartbeat', (event) => {
                        const data = JSON.parse(event.data);
                        this.log(`心跳: ${data.type}`, 'heartbeat');
                    });

                    this.eventSource.onerror = (error) => {
                        this.log('SSE连接错误', 'error');
                        this.disconnect();
                        this.attemptReconnect();
                    };

                } catch (error) {
                    this.log(`连接SSE失败: ${error.message}`, 'error');
                    this.elements.connectBtn.disabled = false;
                    this.elements.connectLoading.style.display = 'none';
                    this.elements.connectBtnText.textContent = '连接SSE';
                    this.attemptReconnect();
                }
            }

            disconnect() {
                if (this.eventSource) {
                    this.eventSource.close();
                    this.eventSource = null;
                }
                
                this.isConnected = false;
                this.updateConnectionStatus(false);
                this.log('SSE连接已断开', 'info');
                
                this.elements.connectBtn.disabled = false;
                this.elements.connectLoading.style.display = 'none';
                this.elements.connectBtnText.textContent = '连接SSE';
                this.elements.disconnectBtn.disabled = true;
            }

            attemptReconnect() {
                if (this.reconnectAttempts >= this.maxReconnectAttempts) {
                    this.log('达到最大重连次数，停止重连', 'warning');
                    return;
                }

                this.reconnectAttempts++;
                const delay = this.reconnectDelay * Math.pow(2, this.reconnectAttempts - 1);
                
                this.log(`将在 ${delay}ms 后尝试重连 (第 ${this.reconnectAttempts} 次)`, 'info');
                
                setTimeout(() => {
                    if (!this.isConnected) {
                        this.connect();
                    }
                }, delay);
            }

            handleTemperatureData(data) {
                this.dataCount++;
                this.elements.dataCount.textContent = this.dataCount;
                
                // 更新温度显示
                this.elements.currentTemp.textContent = data.value.toFixed(1);
                this.elements.tempTimestamp.textContent = `更新时间: ${new Date(data.timestamp).toLocaleString()}`;
                
                // 添加到数据数组
                this.temperatureData.push(data);
                if (this.temperatureData.length > this.maxDataPoints) {
                    this.temperatureData.shift();
                }
                
                // 更新图表
                this.drawChart();
                
                // 记录日志
                this.log(`温度: ${data.value.toFixed(1)}°C`, 'temperature');
            }

            async startCollection() {
                try {
                    const interval = parseInt(this.elements.collectionInterval.value);
                    const response = await fetch('/api/temperature/control/start', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ interval })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        this.log('温度采集已启动', 'success');
                        this.elements.startCollectionBtn.disabled = true;
                        this.elements.stopCollectionBtn.disabled = false;
                        this.updateCollectionStatus(true);
                    } else {
                        this.log(`启动温度采集失败: ${result.message}`, 'error');
                    }
                } catch (error) {
                    this.log(`启动温度采集错误: ${error.message}`, 'error');
                }
            }

            async stopCollection() {
                try {
                    const response = await fetch('/api/temperature/control/stop', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        this.log('温度采集已停止', 'info');
                        this.elements.startCollectionBtn.disabled = false;
                        this.elements.stopCollectionBtn.disabled = true;
                        this.updateCollectionStatus(false);
                    } else {
                        this.log(`停止温度采集失败: ${result.message}`, 'error');
                    }
                } catch (error) {
                    this.log(`停止温度采集错误: ${error.message}`, 'error');
                }
            }

            async resetTemperature() {
                try {
                    const response = await fetch('/api/temperature/control/reset', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        this.log('温度已重置', 'info');
                    } else {
                        this.log(`重置温度失败: ${result.message}`, 'error');
                    }
                } catch (error) {
                    this.log(`重置温度错误: ${error.message}`, 'error');
                }
            }

            async applyConfiguration() {
                try {
                    const minTemp = parseFloat(this.elements.minTemp.value);
                    const maxTemp = parseFloat(this.elements.maxTemp.value);
                    
                    if (minTemp >= maxTemp) {
                        this.log('温度范围设置错误: 最小值必须小于最大值', 'error');
                        return;
                    }
                    
                    const response = await fetch('/api/temperature/config/range', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ min: minTemp, max: maxTemp })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        this.log(`温度范围已设置: ${minTemp}°C - ${maxTemp}°C`, 'success');
                    } else {
                        this.log(`设置温度范围失败: ${result.message}`, 'error');
                    }
                } catch (error) {
                    this.log(`设置温度范围错误: ${error.message}`, 'error');
                }
            }

            updateConnectionStatus(connected) {
                const indicator = this.elements.connectionStatus;
                const text = this.elements.connectionText;
                
                if (connected) {
                    indicator.className = 'status-indicator connected';
                    text.textContent = '已连接';
                } else {
                    indicator.className = 'status-indicator disconnected';
                    text.textContent = '未连接';
                }
            }

            updateCollectionStatus(collecting) {
                this.elements.collectionStatus.textContent = collecting ? '采集中' : '已停止';
            }

            log(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = document.createElement('div');
                logEntry.className = 'log-entry';
                
                let className = '';
                switch (type) {
                    case 'temperature':
                        className = 'log-temperature';
                        break;
                    case 'heartbeat':
                        className = 'log-event';
                        break;
                    case 'error':
                        className = 'log-error';
                        break;
                    default:
                        className = '';
                }
                
                logEntry.innerHTML = `
                    <span class="log-timestamp">${timestamp}</span>
                    <span class="${className}">${message}</span>
                `;
                
                this.elements.dataLog.insertBefore(logEntry, this.elements.dataLog.firstChild);
                
                // 保持日志数量在合理范围内
                const entries = this.elements.dataLog.querySelectorAll('.log-entry');
                if (entries.length > 100) {
                    entries[entries.length - 1].remove();
                }
            }

            async updateConnectionCount() {
                try {
                    const response = await fetch('/api/temperature/connections');
                    const result = await response.json();
                    
                    if (result.success) {
                        this.elements.connectionCount.textContent = result.data.totalConnections;
                    }
                } catch (error) {
                    console.error('更新连接数失败:', error);
                }
            }

            startPeriodicUpdates() {
                // 每秒更新一次连接数
                setInterval(() => {
                    this.updateConnectionCount();
                }, 1000);
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new TemperatureSSEClient();
        });
    </script>
</body>
</html>
