<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时温度监控系统 - SSE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .control-panel {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .control-panel h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 600;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-right: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
      background: #e74c3c;
      color: white;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-bar {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #95a5a6;
      animation: pulse 2s infinite;
    }

    .status-indicator.connected {
      background: #2ecc71;
    }

    .status-indicator.disconnected {
      background: #e74c3c;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .data-display {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .data-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .data-card:hover {
      transform: translateY(-5px);
    }

    .data-card h3 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 1.2em;
    }

    .data-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .data-unit {
      font-size: 0.9em;
      color: #777;
    }

    .data-time {
      color: #999;
      font-size: 0.85em;
      margin-top: 10px;
    }

    .alert-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
      margin-top: 10px;
    }

    .alert-normal {
      background: #d4edda;
      color: #155724;
    }

    .alert-caution {
      background: #fff3cd;
      color: #856404;
    }

    .alert-warning {
      background: #ffe5d0;
      color: #8b4513;
    }

    .alert-critical {
      background: #f8d7da;
      color: #721c24;
    }

    .log-panel {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .log-panel h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 1.5em;
    }

    .log-container {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      gap: 10px;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #6c757d;
      min-width: 120px;
    }

    .log-type {
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      min-width: 100px;
      text-align: center;
    }

    .log-type.connected {
      background: #d4edda;
      color: #155724;
    }

    .log-type.disconnected {
      background: #f8d7da;
      color: #721c24;
    }

    .log-type.heartbeat {
      background: #d1ecf1;
      color: #0c5460;
    }

    .log-type.update {
      background: #d4edda;
      color: #155724;
    }

    .log-type.error {
      background: #f8d7da;
      color: #721c24;
    }

    .log-message {
      color: #212529;
      flex: 1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stat-item {
      text-align: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .stat-label {
      color: #6c757d;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1.5em;
      font-weight: bold;
      color: #667eea;
    }

    .reconnect-countdown {
      text-align: center;
      padding: 15px;
      background: #fff3cd;
      border-radius: 8px;
      margin-top: 15px;
      color: #856404;
      font-weight: 600;
      display: none;
    }

    .reconnect-countdown.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌡️ 实时温度监控系统</h1>

    <div class="control-panel">
      <h2>连接配置</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="robotId">机器人 ID</label>
          <input type="number" id="robotId" placeholder="可选" min="1">
        </div>
        <div class="form-group">
          <label for="taskId">任务 ID</label>
          <input type="number" id="taskId" placeholder="可选" min="1">
        </div>
        <div class="form-group">
          <label for="interval">更新间隔 (ms)</label>
          <input type="number" id="interval" value="1000" min="100" max="60000" step="100">
        </div>
        <div class="form-group">
          <label for="precision">数据精度</label>
          <select id="precision">
            <option value="1">1 位小数</option>
            <option value="2" selected>2 位小数</option>
            <option value="3">3 位小数</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>
            <input type="checkbox" id="includeHumidity" checked> 包含湿度数据
          </label>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="includeAlerts"> 包含告警信息
          </label>
        </div>
      </div>
      <div>
        <button class="btn btn-primary" id="connectBtn" onclick="connect()">连接</button>
        <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>断开</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item">
        <div class="status-indicator" id="statusIndicator"></div>
        <span id="statusText">未连接</span>
      </div>
      <div class="status-item">
        <span>最后更新：<strong id="lastUpdate">-</strong></span>
      </div>
      <div class="status-item">
        <span>接收数据：<strong id="dataCount">0</strong> 条</span>
      </div>
    </div>

    <div class="data-display" id="dataDisplay" style="display: none;">
      <div class="data-card">
        <h3>当前温度</h3>
        <div class="data-value" id="temperature">--</div>
        <div class="data-unit">°C</div>
        <div class="data-time" id="tempTime">-</div>
        <div class="alert-badge alert-normal" id="tempAlert">正常</div>
      </div>
      <div class="data-card" id="humidityCard">
        <h3>湿度</h3>
        <div class="data-value" id="humidity">--</div>
        <div class="data-unit">%RH</div>
        <div class="data-time" id="humidityTime">-</div>
      </div>
      <div class="data-card">
        <h3>最高温度</h3>
        <div class="data-value" id="maxTemp">--</div>
        <div class="data-unit">°C</div>
        <div class="data-time" id="maxTempTime">-</div>
      </div>
      <div class="data-card">
        <h3>烟雾浓度</h3>
        <div class="data-value" id="smokeLevel">--</div>
        <div class="data-unit">ppm</div>
        <div class="data-time" id="smokeTime">-</div>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid" style="display: none;">
      <div class="stat-item">
        <div class="stat-label">平均温度</div>
        <div class="stat-value" id="avgTemp">--</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">最低温度</div>
        <div class="stat-value" id="minTemp">--</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">最高温度</div>
        <div class="stat-value" id="maxTempStat">--</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">平均湿度</div>
        <div class="stat-value" id="avgHumidity">--</div>
      </div>
    </div>

    <div class="reconnect-countdown" id="reconnectCountdown">
      连接断开，将在 <span id="countdown">5</span> 秒后自动重连...
    </div>

    <div class="log-panel">
      <h2>数据日志</h2>
      <div class="log-container" id="logContainer">
        <div class="log-entry">
          <span class="log-time">--</span>
          <span class="log-type">系统</span>
          <span class="log-message">等待连接...</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let eventSource = null;
    let dataCount = 0;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 5;
    const reconnectDelay = 5000;
    let reconnectTimer = null;
    let temperatureHistory = [];

    function connect() {
      const robotId = document.getElementById('robotId').value;
      const taskId = document.getElementById('taskId').value;
      const interval = document.getElementById('interval').value;
      const precision = document.getElementById('precision').value;
      const includeHumidity = document.getElementById('includeHumidity').checked;
      const includeAlerts = document.getElementById('includeAlerts').checked;

      const params = new URLSearchParams();
      if (robotId) params.append('robot_id', robotId);
      if (taskId) params.append('task_id', taskId);
      params.append('interval', interval || 1000);
      params.append('precision', precision || 2);
      params.append('include_humidity', includeHumidity);
      params.append('include_alerts', includeAlerts);

      const url = `/api/sse/temperature/stream?${params.toString()}`;

      addLog('connected', '正在连接...', url);
      updateStatus('connecting');

      eventSource = new EventSource(url);

      eventSource.onopen = function(event) {
        addLog('connected', 'SSE 连接已建立', `连接 URL: ${url}`);
        updateStatus('connected');
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('disconnectBtn').disabled = false;
        document.getElementById('dataDisplay').style.display = 'grid';
        document.getElementById('statsGrid').style.display = 'grid';
        reconnectAttempts = 0;
      };

      eventSource.onmessage = function(event) {
        try {
          const data = JSON.parse(event.data);
          handleSSEMessage(data);
        } catch (error) {
          addLog('error', '解析消息失败', error.message);
        }
      };

      eventSource.onerror = function(error) {
        console.error('SSE 错误:', error);
        addLog('error', 'SSE 连接错误', '尝试重新连接...');
        updateStatus('disconnected');
        handleReconnect();
      };
    }

    function handleSSEMessage(data) {
      const now = new Date().toLocaleTimeString();

      switch(data.type) {
        case 'connected':
          addLog('connected', '服务器已连接', `客户端 ID: ${data.clientId}`);
          break;

        case 'heartbeat':
          addLog('heartbeat', '心跳包', `服务器时间：${data.timestamp}`);
          break;

        case 'initial_data':
          addLog('update', '初始数据', `温度：${data.data.temperature}°C`);
          updateDisplay(data.data);
          break;

        case 'temperature_update':
          dataCount++;
          document.getElementById('dataCount').textContent = dataCount;
          document.getElementById('lastUpdate').textContent = now;
          addLog('update', '温度更新', `温度：${data.data.temperature}°C, 湿度：${data.data.humidity}%`);
          updateDisplay(data.data);
          
          if (data.alerts && data.alerts.length > 0) {
            addLog('warning', '发现告警', `${data.alerts.length} 条未处理告警`);
          }
          break;

        case 'error':
          addLog('error', '服务器错误', data.message);
          break;
      }
    }

    function updateDisplay(data) {
      const alertLevel = getAlertLevel(data.temperature, data.fire_risk);
      
      document.getElementById('temperature').textContent = data.temperature.toFixed(2);
      document.getElementById('tempTime').textContent = formatTime(data.data_time);
      updateAlertBadge('tempAlert', alertLevel);

      if (data.humidity !== undefined) {
        document.getElementById('humidity').textContent = data.humidity.toFixed(2);
        document.getElementById('humidityTime').textContent = formatTime(data.data_time);
      }

      document.getElementById('maxTemp').textContent = data.max_temp.toFixed(2);
      document.getElementById('maxTempTime').textContent = formatTime(data.data_time);

      document.getElementById('smokeLevel').textContent = data.smoke_level.toFixed(3);
      document.getElementById('smokeTime').textContent = formatTime(data.data_time);

      temperatureHistory.push(data.temperature);
      if (temperatureHistory.length > 100) {
        temperatureHistory.shift();
      }

      updateStats();
    }

    function updateStats() {
      if (temperatureHistory.length === 0) return;

      const avg = temperatureHistory.reduce((a, b) => a + b, 0) / temperatureHistory.length;
      const min = Math.min(...temperatureHistory);
      const max = Math.max(...temperatureHistory);

      document.getElementById('avgTemp').textContent = avg.toFixed(2);
      document.getElementById('minTemp').textContent = min.toFixed(2);
      document.getElementById('maxTempStat').textContent = max.toFixed(2);
    }

    function getAlertLevel(temperature, fire_risk) {
      if (fire_risk >= 3 || temperature >= 80) return 'critical';
      if (fire_risk >= 2 || temperature >= 60) return 'warning';
      if (fire_risk >= 1 || temperature >= 50) return 'caution';
      return 'normal';
    }

    function updateAlertBadge(elementId, level) {
      const badge = document.getElementById(elementId);
      const labels = {
        'normal': '正常',
        'caution': '注意',
        'warning': '警告',
        'critical': '严重'
      };
      
      badge.className = `alert-badge alert-${level}`;
      badge.textContent = labels[level];
    }

    function disconnect() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
        addLog('disconnected', '手动断开连接', '用户操作');
        updateStatus('disconnected');
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
      }
    }

    function handleReconnect() {
      if (reconnectAttempts >= maxReconnectAttempts) {
        addLog('error', '重连失败', `已达到最大重连次数 (${maxReconnectAttempts})`);
        document.getElementById('reconnectCountdown').classList.remove('show');
        return;
      }

      reconnectAttempts++;
      const countdownElement = document.getElementById('reconnectCountdown');
      const countdownSpan = document.getElementById('countdown');
      countdownElement.classList.add('show');

      let seconds = reconnectDelay / 1000;
      countdownSpan.textContent = seconds;

      const countdownInterval = setInterval(() => {
        seconds--;
        countdownSpan.textContent = seconds;

        if (seconds <= 0) {
          clearInterval(countdownInterval);
          countdownElement.classList.remove('show');
          addLog('connected', '尝试重连', `第 ${reconnectAttempts} 次重连`);
          connect();
        }
      }, 1000);
    }

    function updateStatus(status) {
      const indicator = document.getElementById('statusIndicator');
      const text = document.getElementById('statusText');

      indicator.className = 'status-indicator';
      
      switch(status) {
        case 'connected':
          indicator.classList.add('connected');
          text.textContent = '已连接';
          break;
        case 'disconnected':
          indicator.classList.add('disconnected');
          text.textContent = '已断开';
          break;
        case 'connecting':
          indicator.style.background = '#f39c12';
          text.textContent = '连接中...';
          break;
        default:
          indicator.style.background = '#95a5a6';
          text.textContent = '未连接';
      }
    }

    function addLog(type, title, message) {
      const container = document.getElementById('logContainer');
      const entry = document.createElement('div');
      entry.className = 'log-entry';

      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      
      entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-type ${type}">${title}</span>
        <span class="log-message">${message}</span>
      `;

      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;

      if (container.children.length > 100) {
        container.removeChild(container.firstChild);
      }
    }

    function formatTime(dateString) {
      const date = new Date(dateString);
      return date.toLocaleTimeString('zh-CN', { hour12: false });
    }

    window.addEventListener('beforeunload', () => {
      disconnect();
    });

    document.addEventListener('DOMContentLoaded', () => {
      addLog('system', '系统就绪', '页面加载完成，请点击"连接"按钮开始接收数据');
    });
  </script>
</body>
</html>
